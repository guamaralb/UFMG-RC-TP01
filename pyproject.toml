demo = """
python3 rc_tp01/server.py 5555 12345678 6 &
sleep 1
python3 rc_tp01/client.py localhost 5555
"""


[tool.poetry.dependencies]
rich = "^15.0.0"
pytest = "^9.0.3"
pytest-cov = "^7.1.0"
